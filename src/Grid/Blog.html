<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Blog Pessoal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            padding: 20px;
        }

        #cabecalho {
            background-color: #333;
            color: white;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
        }

        #conteudo {
            display: flex;
            gap: 15px;
        }

        .posts {
            flex: 1;
        }

        .post {
            background-color: white;
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 15px;
        }

        .sidebar {
            width: 220px;
        }

        .widget {
            background-color: white;
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 15px;
        }


    </style>
</head>
<body>

<div id="cabecalho">
    <h1>Meu Blog</h1>
    <p>Página pessoal</p>
</div>

<div id="conteudo">

    <div class="posts">
        <div class="post">
            <h2>Meu primeiro post</h2>
            <p>Texto do post aqui.</p>
            <p>01/03/2025</p>
        </div>

        <div class="post">
            <h2>Aprendendo HTML e CSS</h2>
            <p>Texto do post aqui.</p>
            <p>10/03/2025</p>
        </div>

        <div class="post">
            <h2>O que é CSS Grid?</h2>
            <p>Texto do post aqui.</p>
            <p>18/03/2025</p>
        </div>
    </div>

    <div class="sidebar">
        <div class="widget">
            <h3>Sobre mim</h3>
            <p>Estudante de desenvolvimento web.</p>
        </div>

        <div class="widget">
            <h3>Categorias</h3>
            <ul>
                <li>Tecnologia</li>
                <li>Design</li>
                <li>Programação</li>
            </ul>
        </div>
    </div>

</div>



</body>
</html>
