<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Planner</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        h1{
            font-size: 60px;
            margin-bottom: 40px;
        }

        .container{
            display: flex;
            gap: 60px;
        }

        table{
            border-collapse: collapse;
        }

        th{
            border: 3px solid black;
            font-size: 28px;
            width: 180px;
            height: 80px;
            text-align: center;
        }

        td{
            border: 3px solid black;
            width: 180px;
            height: 140px;
            font-size: 26px;
            vertical-align: top;
            padding: 10px;
        }

        .anotacoes{
            width: 450px;
            height: 820px;
            border: 4px solid black;
            padding: 20px;
        }

        .anotacoes h2{
            font-size: 36px;
        }

        .tarefas{
            margin-top: 60px;
            width: 100%;
            height: 250px;
            border: 4px solid black;
            padding: 20px;
        }

        .tarefas h2{
            font-size: 36px;
        }

    </style>

</head>

<body>

<h1>Planner (Março)</h1>

<div class="container">

    <div class="calendario">

        <table>

            <tr>
                <th>Dom</th>
                <th>Seg</th>
                <th>Ter</th>
                <th>Qua</th>
                <th>Qui</th>
                <th>Sex</th>
                <th>Sab</th>
            </tr>

            <tr>
                <td></td>
                <td>1</td>
                <td>2</td>
                <td>3</td>
                <td>4</td>
                <td>5</td>
                <td>6</td>
            </tr>

            <tr>
                <td>7</td>
                <td>8</td>
                <td>9</td>
                <td>10</td>
                <td>11</td>
                <td>12</td>
                <td>13</td>
            </tr>

            <tr>
                <td>14</td>
                <td>15</td>
                <td>16</td>
                <td>17</td>
                <td>18</td>
                <td>19</td>
                <td>20</td>
            </tr>

            <tr>
                <td>21</td>
                <td>22</td>
                <td>23</td>
                <td>24</td>
                <td>25</td>
                <td>26</td>
                <td>27</td>
            </tr>

            <tr>
                <td>28</td>
                <td>29</td>
                <td>30</td>
                <td>31</td>
                <td></td>
                <td></td>
                <td></td>
            </tr>

        </table>

    </div>

    <div class="anotacoes">
        <h2>Anotações</h2>
    </div>

</div>

<div class="tarefas">
    <h2>Lista de Tarefas</h2>
</div>

</body>
</html>
